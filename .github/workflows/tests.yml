name: Tests

on:
  push:
  pull_request:

jobs:
  gut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot 4.7 (plain, not Mono)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false

      - name: Import project
        run: godot --headless --path . --import

      - name: Run GUT unit tests
        run: godot --headless --path . -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json
